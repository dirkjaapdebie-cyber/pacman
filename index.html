<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juridische Pacman - Bulk Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #game-board {
            width: 600px;
            height: 400px;
            background-color: #000;
            position: relative;
            overflow: hidden;
            border: 4px solid #2563eb;
            border-radius: 8px;
        }
        .pacman {
            width: 30px;
            height: 30px;
            background-color: yellow;
            border-radius: 50%;
            position: absolute;
            transition: all 0.1s linear;
        }
        .pacman::after {
            content: '';
            display: block;
            width: 0; height: 0;
            border-right: 15px solid transparent;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            position: absolute;
            right: 0; top: 0;
        }
        .word-item {
            position: absolute;
            color: #fff;
            font-size: 12px;
            font-weight: bold;
            background: rgba(37, 99, 235, 0.5);
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }
    </style>
</head>
<body class="bg-slate-950 flex flex-col items-center justify-center min-h-screen p-4 text-white">

    <h1 class="text-3xl font-bold text-blue-500 mb-4 uppercase">Juridische Pacman</h1>
    
    <div id="game-board">
        <div id="pacman" class="pacman" style="left: 20px; top: 20px;"></div>
    </div>

    <div class="mt-6 w-full max-w-2xl bg-slate-900 p-6 rounded-lg border border-slate-700">
        <h2 class="text-xl font-bold text-blue-400 mb-4">De Juridische Woorden Bulk</h2>
        <div id="bulk-list" class="grid grid-cols-2 gap-2 text-sm">
            </div>
    </div>

    <script>
        // --- DE BULK AAN WOORDEN EN BETEKENISSEN ---
        const juridischeBulk = [
            { woord: "Tenlastelegging", betekenis: "De officiële beschuldiging in de dagvaarding." },
            { woord: "Requisitoir", betekenis: "De slottoespraak van de Officier met de strafeis." },
            { woord: "Pleidooi", betekenis: "De verdediging van de advocaat voor de verdachte." },
            { woord: "Vonnis", betekenis: "De uitspraak van de rechter." },
            { woord: "Recidivegevaar", betekenis: "De kans dat iemand weer een misdaad pleegt." },
            { woord: "Mishandeling", betekenis: "Opzettelijk pijn of letsel toebrengen aan een ander." },
            { woord: "Bewijslast", betekenis: "De plicht om aan te tonen dat iemand schuldig is." },
            { woord: "Shocktoestand", betekenis: "Hevige emotionele reactie na een trauma." },
            { woord: "Huisverbod", betekenis: "Tijdelijk verbod om de eigen woning te betreden." },
            { woord: "Proeftijd", betekenis: "Periode waarin je niet opnieuw de fout in mag gaan." }
        ];

        const board = document.getElementById('game-board');
        const pacman = document.getElementById('pacman');
        const bulkDisplay = document.getElementById('bulk-list');
        
        let pacX = 20;
        let pacY = 20;

        // 1. Vul de lijst onderaan
        juridischeBulk.forEach(item => {
            const div = document.createElement('div');
            div.className = "p-2 border-b border-slate-800";
            div.innerHTML = `<span class="text-blue-400 font-bold">${item.woord}:</span> ${item.betekenis}`;
            bulkDisplay.appendChild(div);

            // 2. Plaats woorden willekeurig in het speelveld
            const wordSpan = document.createElement('div');
            wordSpan.className = 'word-item';
            wordSpan.innerText = item.woord;
            wordSpan.style.left = Math.random() * 500 + 'px';
            wordSpan.style.top = Math.random() * 350 + 'px';
            board.appendChild(wordSpan);
        });

        // 3. Besturing (Pijltjestoetsen)
        window.addEventListener('keydown', (e) => {
            const step = 20;
            if(e.key === 'ArrowRight') pacX += step;
            if(e.key === 'ArrowLeft') pacX -= step;
            if(e.key === 'ArrowUp') pacY -= step;
            if(e.key === 'ArrowDown') pacY += step;

            // Grenzen bewaken
            pacX = Math.max(0, Math.min(570, pacX));
            pacY = Math.max(0, Math.min(370, pacY));

            pacman.style.left = pacX + 'px';
            pacman.style.top = pacY + 'px';

            checkCollision();
        });

        // 4. Check of Pacman een woord hapt
        function checkCollision() {
            const words = document.querySelectorAll('.word-item');
            words.forEach(word => {
                const rect1 = pacman.getBoundingClientRect();
                const rect2 = word.getBoundingClientRect();

                if (!(rect1.right < rect2.left || 
                      rect1.left > rect2.right || 
                      rect1.bottom < rect2.top || 
                      rect1.top > rect2.bottom)) {
                    word.style.backgroundColor = '#10b981'; // Wordt groen bij 'happen'
                    setTimeout(() => word.remove(), 200);   // Verdwijnt
                }
            });
        }
    </script>
</body>
</html>
