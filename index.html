<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Juridische Pacman - Woordenhapper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Courier New', Courier, monospace; }
        #game-container { position: relative; width: 400px; height: 400px; border: 4px solid #222; margin: 20px auto; background: #050505; }
        .pacman { 
            position: absolute; width: 30px; height: 30px; background: #ffff00; border-radius: 50%;
            clip-path: polygon(100% 0%, 100% 100%, 50% 50%, 100% 0%); /* De hap-mond */
            transition: all 0.1s linear;
        }
        .word-dot { position: absolute; background: #ffb8ae; padding: 2px 6px; border-radius: 4px; font-size: 10px; color: #000; font-weight: bold; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <h1 class="text-3xl font-bold text-yellow-400 mb-4 uppercase tracking-tighter">Juridische Woordenhapper</h1>
    
    <div id="game-container">
        <div id="pacman" class="pacman" style="left: 185px; top: 185px;"></div>
    </div>

    <div class="max-w-md w-full bg-slate-900 p-6 rounded-xl border-t-4 border-yellow-400 shadow-2xl">
        <h2 class="text-yellow-400 font-bold mb-2 uppercase">Hap-Lijst (De Bulk)</h2>
        <div id="lexicon-display" class="grid grid-cols-2 gap-2 text-[10px] text-slate-300">
            </div>
    </div>

    <script>
        // DE BULK AAN WOORDEN
        const juridischeBulk = [
            { w: "Tenlastelegging", d: "De officiële beschuldiging" },
            { w: "Requisitoir", d: "De strafeis van de Officier" },
            { w: "Pleidooi", d: "De verdediging van de advocaat" },
            { w: "Vonnis", d: "De uitspraak van de rechter" },
            { w: "Recidive", d: "Herhaling van een misdrijf" },
            { w: "Proeftijd", d: "Periode waarin je niet in de fout mag gaan" },
            { w: "Mishandeling", d: "Iemand opzettelijk pijn doen" },
            { w: "Huisverbod", d: "Tijdelijk verbod om je huis in te gaan" }
        ];

        const container = document.getElementById('lexicon-display');
        
        // Vul de lijst onder het spel
        juridischeBulk.forEach(item => {
            const div = document.createElement('div');
            div.className = "p-1 border-b border-slate-800";
            div.innerHTML = `<span class="text-yellow-400 font-bold">${item.w}:</span> ${item.d}`;
            container.appendChild(div);
        });

        // Simpele visuele weergave van de woorden in het veld
        const gameBox = document.getElementById('game-container');
        juridischeBulk.forEach((item, index) => {
            const dot = document.createElement('div');
            dot.className = "word-dot";
            dot.innerText = item.w;
            dot.style.left = Math.random() * 300 + "px";
            dot.style.top = Math.random() * 300 + "px";
            gameBox.appendChild(dot);
        });
    </script>

    <p class="mt-4 text-slate-500 text-xs italic text-center">
        Gebruik deze bulk om termen te trainen.<br>
        Pacman hapt alleen de juiste juridische kennis!
    </p>

</body>
</html>
